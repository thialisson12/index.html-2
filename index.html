<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Somar Prestadora de Serviços | Pomerode-SC</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: Arial, sans-serif;
      background:#fff;
      color:#222;
    }

    header {
      text-align:center;
      padding:20px;
      border-bottom:1px solid #eee;
    }

    .logo-text {
      font-size:2rem;
      font-weight:900;
      letter-spacing:3px;
      color:#000;
      -webkit-text-stroke:1.5px #ff8c00;
    }

    .hero {
      position:relative;
      overflow:hidden;
      text-align:center;
      padding:100px 20px;
      background:linear-gradient(135deg,#f7f7f7,#ececec);
    }

    /* FUNDO SOMAR PREMIUM */
    .hero::before {
      content:"SOMAR";
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%) scale(0.9);
      font-size:180px;
      font-weight:900;
      letter-spacing:12px;

      color:rgba(255,140,0,0.08);

      /* 🔥 GLOW LARANJA */
      text-shadow:
        0 0 10px rgba(255,140,0,0.15),
        0 0 20px rgba(255,140,0,0.08);

      filter:blur(2px);

      opacity:0;
      animation:fadeSOMAR 1.8s ease forwards;

      z-index:0;
      pointer-events:none;
    }

    /* ANIMAÇÃO ENTRADA */
    @keyframes fadeSOMAR {
      0% {
        opacity:0;
        transform:translate(-50%,-40%) scale(0.8);
        filter:blur(6px);
      }
      100% {
        opacity:1;
        transform:translate(-50%,-50%) scale(1);
        filter:blur(2px);
      }
    }

    .container {
      position:relative;
      z-index:1;
      max-width:1000px;
      margin:auto;
    }

    h1 {
      font-size:2rem;
      margin-bottom:15px;
    }

    p {
      color:#555;
    }

    .buttons {
      margin-top:30px;
      display:flex;
      flex-direction:column;
      gap:15px;
      align-items:center;
    }

    .btn {
      display:flex;
      align-items:center;
      gap:10px;
      padding:16px 25px;
      border-radius:15px;
      color:#fff;
      font-weight:bold;
      text-decoration:none;
      min-width:280px;
      justify-content:center;
      transition:0.3s;
      transform:translateY(30px);
      opacity:0;
      animation:fadeUp 0.8s forwards;
    }

    .btn:nth-child(1){ animation-delay:0.3s; }
    .btn:nth-child(2){ animation-delay:0.5s; }

    @keyframes fadeUp {
      to {
        opacity:1;
        transform:translateY(0);
      }
    }

    .whatsapp {
      background:#25d366;
      box-shadow:0 10px 25px rgba(37,211,102,0.3);
    }

    .instagram {
      background:#000;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .btn:hover {
      transform:scale(1.05);
    }

    /* 🔥 SCROLL EFFECT */
    .scrolled .hero::before {
      color:rgba(255,140,0,0.15);
      text-shadow:
        0 0 20px rgba(255,140,0,0.3),
        0 0 40px rgba(255,140,0,0.15);
      transform:translate(-50%,-50%) scale(1.05);
    }

    footer {
      text-align:center;
      padding:20px;
      border-top:1px solid #eee;
    }
  </style>
</head>

<body>

<header>
  <div class="logo-text">SOMAR</div>
</header>

<section class="hero">
  <div class="container">
    <h1>Atendimento Rápido em Pomerode-SC e Região</h1>
    <p>Serviços profissionais realizados com qualidade, segurança e compromisso.</p>

    <div class="buttons">
      <a class="btn whatsapp" href="https://wa.me/5547996884563?text=Ol%C3%A1%2C%20tudo%20bem%3F%20%F0%9F%91%8B%0AGostaria%20de%20solicitar%20um%20or%C3%A7amento%21" target="_blank">
        📱 Solicitar Orçamento no WhatsApp
      </a>

      <a class="btn instagram" href="https://www.instagram.com/somar.eletr.hidr.clim?igsh=Yjg3MzZxMGE2cmVs" target="_blank">
        📸 Solicitar Orçamento no Instagram
      </a>
    </div>
  </div>
</section>

<footer>
  © 2026 Somar Prestadora de Serviços
</footer>

<script>
  window.addEventListener("scroll", () => {
    if (window.scrollY > 50) {
      document.body.classList.add("scrolled");
    } else {
      document.body.classList.remove("scrolled");
    }
  });
</script>

</body>
</html>
